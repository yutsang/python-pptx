      C. 格式:
         - 删除外部引号
         - 检查整体一致性
         - 必要时确保适当的段落结构
         - **禁止要点/列表/粗体**
      
      D. 可读性:
         - 内容应自然流畅
         - 避免重复
         - 使用清晰简洁的语言

      E. 数据交叉验证（幻觉检测 — 应用重要性门槛）:
         对最终段落中的每个分句，验证其中每个具体数字、金额、百分比、增长率和趋势声明是否在提供的原始数据中可找到。

         重要性门槛（在应用下方激进标记规则之前，先应用此项）：
         若分句中的每个数字都在可追溯数据的{materiality_threshold_pct}%以内（在下方四舍五入容差基础上叠加，而非替代），且该分句只是标准、低风险的尽调构成/描述性措辞，而非具体的无支持声明，则该分句属于不重要偏差 — 应标记为"data-backed"，不应标记为问题。重要性看的是偏差的大小，而非措辞是否为改写 — 不要仅因分句用不同措辞复述数据就标记它。"reasoning"/"hallucination"应保留给确实引入无支持数字、方向或解释，或偏差超过{materiality_threshold_pct}%的分句。

         数字四舍五入容差（在标记数字为幻觉前请先应用）：
         - 显示四舍五入是允许的。"人民币8万元"可匹配原始值7.5万至8.49万（按整数万元显示口径）。
         - 千分位分隔符不影响匹配："人民币54,950"=54950。
         - 万元/亿元口径允许±5%容差："人民币2亿元"匹配1.9亿–2.1亿。
         - 百分比四舍五入到1位小数允许，57.74%四舍五入为57.7%。
         - 期间标签经显示规范后允许匹配："FY24"对应2024年12月31日；"1M26"对应2026年1月。
         - 仅当数字无法在数据中匹配（万元±5%、千元精确）或为数据中未出现的计算值（如基于原始输入计算出的加权平均利率）时，才标记为"hallucination"。

         - 如果分句中出现某个数字，需在数据中找到对应数据（按上述容差）。
         - 如果趋势声明称"增加"或"减少"，需确认数据中方向一致。
         - 如果给出原因或解释（如"受销量增长驱动"），需检查数据、备注或说明是否支持。如不支持，则为幻觉。
         - 将每个分句分为以下三类之一:
           * "data-backed" — 每个事实和数字都可在数据中直接验证
           * "reasoning" — 从数据推导出的合理推理，但数据中未直接陈述
           * "hallucination" — 包含数据中未出现的数字、事实或解释
         - 拆分段落为分句时，不要在数字中的千分位逗号处断开（如"1,234,567"或"12,345.6"）。
           分句边界通常是句号、分号，或后跟连词/新主语的逗号，而非格式化数字内的逗号。

      输出格式:
      仅返回有效JSON，格式如下:
      {{
        "final_content": "最终润色后的段落",
        "clause_reviews": [
          {{
            "clause": "final_content中的原句/分句",
            "supported": true,
            "category": "data-backed",
            "reason": "简短说明；若不支持，说明缺少何种数据依据"
          }}
        ]
      }}
      `category`字段必须为: "data-backed"、"reasoning"或"hallucination"之一。
      "data-backed"时`supported`为true，"reasoning"和"hallucination"时`supported`为false。
      必须按顺序覆盖final_content中的每个分句，并且`clause`必须逐字复制自final_content，不要改写。若趋势或原因分句无数据支持，则必须将`supported`设为false。
      
      重要: 如果内容已经格式良好且清晰, 请原样输出。
      仅在有实际问题需要修正时才进行更改。
      
      输出要求:
      仅输出JSON对象。不要添加Markdown代码块、解释、摘要或元评论。
    
    user_prompt: |
      审核并最终确定此内容。
      
      键: {key}
      内容: {content}
      语言: {language}
      原始数据: {financial_data}
      {rhs_guidance_block}
      {remarks_weight_instruction}
      {user_guidance_instruction}
      
      检查并润色:
      1. 货币格式是否正确?
      2. 语言是否专业清晰?
      3. 是否有冗余或复杂需要简化?
      4. 整体可读性是否良好?
      5. **最重要**: 是否有任何英文内容需要删除或翻译?
         - 英文占位符: Which Entity, Date, location, status等
         - 技术字段: leasing_status_status, account_type, _status, _type等
         - 确保输出100%纯中文, 删除所有英文单词、下划线组合和技术符号
      6. 是否使用了所有示意性调整后期间来判断趋势表述?
      7. 请逐分句审阅。对每个分句，判断其是否得到提供的数据、补充备注、右侧备注或用户备注支持。
      8. 若某分句是原因解释或趋势推理但无支持，请在`clause_reviews`中标记为不支持。
      9. 行文必须像财务尽调评论，不要保留固定模板、程序化表述或无依据政策措辞。
      10. 尽量去除可避免的括号数字，让数字自然写入句子。
      11. **格式检查**: 确保没有要点、列表或粗体字。只使用段落。
      12. **幻觉检测**: 对每个分句中的每个数字、金额、百分比和趋势方向，与提供的原始数据交叉验证。如果某个具体数字无法追溯到数据，则将该分句标记为"hallucination"。
      13. 拆分分句时，不要在数字中的千分位逗号处断开（如"1,234,567"）。

      仅输出有效JSON，包含:
      - `final_content`
      - `clause_reviews`
      每个`clause_reviews`项必须包含`clause`、`supported`、`category`和`reason`。`category`必须为"data-backed"、"reasoning"或"hallucination"。`clause`必须直接复制自`final_content`。