openai:
  api_key: ""
  api_base: ""
  chat_model: ""
  api_version_completion: ""

local:
  api_base: "http://localhost:8000/v1"
  api_key: "not-needed"
  chat_model: "Qwen3-32B"   # must match the id your local server serves
  supports_thinking: true   # Qwen3 emits <think>; structured stages disable it via allow_thinking

deepseek:
  api_key: ""
  api_base: "https://api.deepseek.com/v1"
  chat_model: "deepseek-chat"

agents:
  # allow_thinking: false sends enable_thinking=false to Qwen3 for structured
  # stages (skips <think> for speed + clean JSON). Omit / true keeps thinking on.
  1_Generator:
    temperature: 0.6
    max_tokens: 2000
    top_p: 0.95
    allow_thinking: true
  2_Auditor:
    temperature: 0.2
    max_tokens: 2000
    top_p: 0.8
    allow_thinking: false
  3_Refiner:
    temperature: 0.5
    max_tokens: 2000
    top_p: 0.9
    reduction_target_pct: 64
  4_Validator:
    temperature: 0.1
    max_tokens: 2000
    top_p: 0.8
    allow_thinking: false

processing:
  data_format_for_ai: "json"
  debug_mode: false
  feedback_loop:
    enabled: true
    max_retries: 2
    unsupported_threshold: 0.3

logging:
  suppress_http_logs: true
