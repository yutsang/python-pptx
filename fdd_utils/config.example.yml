openai:
  api_key: ""
  api_base: ""
  chat_model: ""
  api_version_completion: ""

local:
  api_base: "http://localhost:8000/v1"
  api_key: "not-needed"
  chat_model: "Qwen3-32B"   # must match the id your local server serves
  supports_thinking: true   # Qwen3 emits <think>; structured stages disable it via allow_thinking
  # The local server serves one request effectively serially — default to 1
  # worker. Every other provider defaults to 4 (parallel, no UI toggle
  # needed) unless overridden with its own max_workers (see workbench below).
  max_workers: 1

deepseek:
  api_key: ""
  api_base: "https://api.deepseek.com/v1"
  chat_model: "deepseek-chat"

# KPMG Workbench gateway (Azure OpenAI-compatible). api_key doubles as the
# 'Ocp-Apim-Subscription-Key' header value the gateway requires.
workbench:
  api_key: ""
  api_base: "https://api.workbench.kpmg/genai/azure/openai"
  api_version: "2024-12-01-preview"
  chat_model: "gpt-5-5-2026-04-24-gs-sdc"
  charge_code: "0000"
  region_override: "westeurope"
  reasoning_effort: "high"           # "high" | "medium" | "low" | "" to omit
  # Model capability flags — confirmed against the real gateway. Flip these
  # if a future model/deployment behaves differently; the client also
  # self-heals on an unrecognised 400 by reading the rejected param's name
  # from the error body and retrying (up to 4 rounds), so these are a
  # fast-path, not the only line of defence.
  supports_temperature: false        # this model only allows temperature=1 (its default)
  supports_sampling_params: false    # this model rejects top_p / frequency_penalty / presence_penalty
  use_max_completion_tokens: true    # this model rejects legacy 'max_tokens'
  # Floor for max_completion_tokens (not a replacement for agents.*.max_tokens
  # below). Reasoning models spend part of the budget on hidden reasoning
  # before the visible answer, so a complex account can exhaust a small
  # per-agent budget and come back empty. 0/blank disables the floor.
  min_max_tokens: 3000
  # Concurrent worker threads per pipeline stage for THIS provider. Built-in
  # default (if omitted) is 2 for any non-local provider — raise it only
  # after validating the gateway handles it with test_workbench_concurrency.py.
  max_workers: 4
  available_models:
    - id: "gpt-5-5-2026-04-24-gs-sdc"
      label: "GPT-5.5"
    - id: "gpt-5-4-2026-03-05-gs-sdc"
      label: "GPT-5.4"

agents:
  # allow_thinking: false sends enable_thinking=false to Qwen3 for structured
  # stages (skips <think> for speed + clean JSON). Omit / true keeps thinking on.
  1_Generator:
    temperature: 0.6
    max_tokens: 2000
    top_p: 0.95
    allow_thinking: true
  2_Auditor:
    temperature: 0.2
    max_tokens: 2000
    top_p: 0.8
    allow_thinking: false
    # workbench only — overrides workbench.reasoning_effort for this stage.
    # Auditor's job (verification, no creative writing) needs less reasoning
    # depth than Generator/Validator. Omit to inherit the global setting.
    reasoning_effort: "low"
  3_Refiner:
    temperature: 0.5
    max_tokens: 2000
    top_p: 0.9
    reduction_target_pct: 64
  4_Validator:
    temperature: 0.1
    max_tokens: 2000
    top_p: 0.8
    allow_thinking: false
    # Below this variance, a clause is immaterial and must NOT be flagged as
    # reasoning/hallucination — tempers the "when in doubt, flag it" bias.
    materiality_threshold_pct: 5

processing:
  data_format_for_ai: "json"
  debug_mode: false
  feedback_loop:
    enabled: true
    max_retries: 2
    unsupported_threshold: 0.3

logging:
  suppress_http_logs: true

pptx:
  # Table style GUID for generated BS/IS tables. Blank = auto-detect from any
  # styled table already in the template (e.g. your UpSlide style). Find GUIDs
  # with: python list_table_styles.py <file>.pptx
  table_style_id: ""
  commentary_packing:
    # Client-font-aware line fitting. metrics json files are committed IN the repo
    # (font_metrics/) so a deployment server needs no fonts installed at all.
    # Regenerate with: python dump_font_metrics.py <font>.ttf > font_metrics/x.json
    # (find the body font with: python detect_body_font.py template.pptx)
    # Paths are repo-relative or absolute; blank = measure with the system font.
    # Verify what's active with: python verify_font_calc.py
    font_metrics_path_eng: "font_metrics/arial_eng.json"
    font_metrics_path_chi: "font_metrics/msyh_chi.json"
    font_family_eng: "Arial"          # system-font fallback family (EN)
    font_family_chi: "Microsoft YaHei" # system-font fallback family (CN)
